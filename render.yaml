databases:
  - name: punch-db
    databaseName: punch
    user: punch_user
    plan: free

services:
  - type: web
    name: punch-system
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && (apt-get install -y fonts-wqy-microhei 2>/dev/null || true)
    startCommand: gunicorn app:app -c gunicorn.conf.py --bind 0.0.0.0:$PORT
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: MOBILE_JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: punch-db
          property: connectionString
      - key: WEBAUTHN_RP_ID
        sync: false
      - key: WEBAUTHN_ORIGIN
        sync: false